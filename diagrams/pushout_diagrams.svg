<svg width="680" height="380" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Pushout construction of MeasuringCup</title>
  <desc>VolumeObject is the shared object mapping into Cup and MeasuringTool, which both map into the pushout MeasuringCup, computed as the max of their weights per action.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="380" fill="#FFFFFF"/>

  <line x1="300" y1="84" x2="185" y2="158" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="380" y1="84" x2="495" y2="158" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="185" y1="204" x2="300" y2="278" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="495" y1="204" x2="380" y2="278" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- VolumeObject: shared object (gray) -->
  <rect x="260" y="40" width="160" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="62" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">VolumeObject</text>

  <!-- Cup: pushout source 1 (teal) -->
  <rect x="100" y="160" width="160" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="180" y="182" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">Cup</text>

  <!-- MeasuringTool: pushout source 2 (coral) -->
  <rect x="420" y="160" width="160" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="500" y="182" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">MeasuringTool</text>

  <!-- MeasuringCup: the pushout result (purple) -->
  <rect x="260" y="280" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="300" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="14" font-weight="500" fill="#26215C">MeasuringCup</text>
  <text x="340" y="318" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#3C3489">max(w1, w2) per action</text>
</svg>